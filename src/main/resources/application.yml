server:
  port: 8080
# Aca manejamos hacia donde conecta nuestra ApiGateway 
# Y el AuthenticationFilter es para la autenticacion de firebase
spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      routes:
        - id: login-route
          uri: https://modulorecursoinnovatech.onrender.com/
          predicates:
            # Aquí ponemos la ruta EXACTA de tu @PostMapping
            - Path=/api/v1/usuarios
        - id: recursos-service
          uri: https://modulorecursoinnovatech.onrender.com/
          predicates:
            - Path=/api/v1/usuarios/**, /api/v1/categorias/**, /api/v1/cargos/**
          filters:
            - AuthenticationFilter
        - id: health-check
          uri: https://modulorecursoinnovatech.onrender.com/
          predicates:
            - Path=/api/v1/health/**

# Monitoreo para Dockerr
management:
  endpoints:
    web:
      exposure:
        include: health, info
