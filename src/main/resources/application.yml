server:
  port: 8080

spring:
  cloud:
    gateway:
      # Configuración de CORS para permitir la conexión con el Frontend (Vite)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: recursos-service
          uri: https://modulorecursoinnovatech.onrender.com/
          predicates:
            - Path=/api/v1/usuarios/**, /api/v1/categorias/**, /api/v1/cargos/**
          filters:
            - AuthenticationFilter
        - id: health-check
          uri: https://modulorecursoinnovatech.onrender.com/
          predicates:
            - Path=/api/v1/health/**

# Monitoreo para Docker
management:
  endpoints:
    web:
      exposure:
        include: health, info
